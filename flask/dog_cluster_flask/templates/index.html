<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Cluster Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>사모예드 vs 닥스훈트</h1>
            <p>KMeans 기반 군집화 결과를 확인하세요.</p>

            <form method="post">
                <label>길이 (Length)</label>
                <input type="number" step="0.1" name="length" required>

                <label>높이 (Height)</label>
                <input type="number" step="0.1" name="height" required>

                <button type="submit">예측하기</button>
            </form>

            {% if prediction %}
                <div class="result">
                    <h2>예측 결과: {{ prediction }}</h2>
                </div>
            {% endif %}

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
        </div>

        {% if graph_file %}
        <div class="card">
            <h2>그래프 결과</h2>
            <img src="{{ url_for('static', filename=graph_file) }}" alt="dog plot">
        </div>
        {% endif %}
    </div>
</body>
</html>
